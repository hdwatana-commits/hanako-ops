<!doctype html>
<html lang="ja">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <meta name="robots" content="noindex">
    <title>最新版へ更新中</title>
    <style>
      body { margin: 0; min-height: 100vh; display: grid; place-items: center; color: #382b31; background: #fff7fa; font-family: -apple-system, BlinkMacSystemFont, "Hiragino Sans", "Yu Gothic", sans-serif; }
      main { width: min(88vw, 420px); padding: 28px 22px; text-align: center; background: #fff; border: 1px solid #f0d9e2; border-radius: 8px; box-shadow: 0 12px 30px rgba(122, 53, 80, .1); }
      h1 { margin: 0 0 10px; font-size: 22px; }
      p { margin: 0; color: #735d66; line-height: 1.7; }
    </style>
  </head>
  <body>
    <main>
      <h1>最新版へ更新中</h1>
      <p>古いデータを整理して、アプリを開き直しています。</p>
    </main>
    <script>
      (async () => {
        try {
          if ("serviceWorker" in navigator) {
            const registrations = await navigator.serviceWorker.getRegistrations();
            await Promise.all(registrations.map((registration) => registration.unregister()));
          }
          if ("caches" in window) {
            const keys = await caches.keys();
            await Promise.all(
              keys
                .filter((key) => key.startsWith("hanako-room-ops-"))
                .map((key) => caches.delete(key)),
            );
          }
        } finally {
          const destination = new URL("./", location.href);
          destination.searchParams.set("v", new URL(location.href).searchParams.get("v") || "192");
          destination.searchParams.set("updated", Date.now());
          location.replace(destination.href);
        }
      })();
    </script>
  </body>
</html>
